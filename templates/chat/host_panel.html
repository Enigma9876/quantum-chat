            {% if is_host %}
            <div class="host-panel"
                style="margin: 16px 16px 0; padding: 12px; background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; flex-shrink: 0;">
                <div
                    style="font-size: 10px; font-weight: 800; color: var(--red); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">
                    Host Controls</div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
                    <select id="host-force-cipher" class="chat-input"
                        style="width: auto; padding: 6px; font-size: 11px;"
                        onchange="socket.emit('host_action', {room, action: 'force_cipher', cipher: this.value})">
                        <option value="">No Cipher Restriction</option>
                        <option value="none">Force: Plaintext</option>
                        <option value="caesar">Force: Caesar</option>
                        <option value="hill">Force: Hill</option>
                        <option value="vigenere">Force: Vigenère</option>
                        <option value="aes">Force: AES-256</option>
                        <option value="quantum">Force: BB84 Quantum</option>
                    </select>

                    <button class="ctrl-btn" style="border-color: var(--red); color: var(--red);"
                        onclick="socket.emit('host_action', {room, action: 'toggle_global_mute'})">Toggle Global
                        Mute</button>

                    <div
                        style="display: flex; gap: 4px; align-items: center; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 6px;">
                        <input type="text" id="host-target" class="chat-input" placeholder="Target Username"
                            style="width: 110px; padding: 4px 8px; font-size: 11px;">
                        <button class="ctrl-btn"
                            onclick="socket.emit('host_action', {room, action: 'kick', target: document.getElementById('host-target').value})">Kick</button>
                        <button class="ctrl-btn"
                            onclick="socket.emit('host_action', {room, action: 'toggle_user_mute', target: document.getElementById('host-target').value})">Mute/Unmute</button>
                        <input type="text" id="host-rename" class="chat-input" placeholder="New Name"
                            style="width: 80px; padding: 4px 8px; font-size: 11px;">
                        <button class="ctrl-btn"
                            onclick="socket.emit('host_action', {room, action: 'rename', target: document.getElementById('host-target').value, new_name: document.getElementById('host-rename').value})">Rename</button>
                    </div>

                    <label
                        style="font-size: 11px; color: #fff; display: flex; align-items: center; gap: 4px; margin-left: auto;">
                        <input type="checkbox" id="host-bold"> Bold Message
                    </label>
                </div>
            </div>
            {% endif %}
